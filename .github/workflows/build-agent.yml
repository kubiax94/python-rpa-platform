name: Build Windows Agent

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - vm_agent/**
      - shared/**
      - agent_service.spec
      - pyproject.toml

jobs:
  build-agent:
    runs-on: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Python
        shell: pwsh
        run: |
          py --list
          py -3.14 --version
          

      - name: Install dependencies
        shell: pwsh
        run: |
          py -3.14 -m pip install --upgrade pip
          py -3.14 -m pip install pyinstaller
          py -3.14 -m pip install -e .

      - name: Build agent_service.exe
        shell: pwsh
        run: |
          py -3.14 -m PyInstaller --clean agent_service.spec

      - name: Verify output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/agent_service.exe")) {
            throw "dist/agent_service.exe not found"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-service-windows
          path: dist/agent_service.exe