name: Build Windows Agent

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    branches:
      - main
    paths:
      - vm_agent/**
      - shared/**
      - agent_service.spec
      - pyproject.toml

permissions:
  contents: write

jobs:
  build-agent:
    runs-on: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Python
        shell: pwsh
        run: |
          py --list
          py -3.14 --version
          

      - name: Install dependencies
        shell: pwsh
        run: |
          py -3.14 -m pip install --upgrade pip
          py -3.14 -m pip install pyinstaller
          py -3.14 -m pip install -e .

      - name: Build agent_service.exe
        shell: pwsh
        run: |
          py -3.14 -m PyInstaller --clean agent_service.spec

      - name: Verify output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/agent_service.exe")) {
            throw "dist/agent_service.exe not found"
          }

      - name: Compute SHA256
        id: checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist/agent_service.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Write checksum file
        shell: pwsh
        run: |
          "${{ steps.checksum.outputs.sha256 }}  agent_service.exe" | Out-File -FilePath "dist/agent_service.exe.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-service-windows
          path: |
            dist/agent_service.exe
            dist/agent_service.exe.sha256

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/agent_service.exe
            dist/agent_service.exe.sha256