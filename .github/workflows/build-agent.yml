name: Build Windows Agent

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - vm_agent/**
      - shared/**
      - agent_service.spec
      - pyproject.toml

jobs:
  build-agent:
    runs-on: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show environment
        shell: pwsh
        run: |
          python --version
          pip --version
          Get-Location

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e .

      - name: Build agent_service.exe
        shell: pwsh
        run: |
          python -m PyInstaller --clean agent_service.spec

      - name: Verify output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/agent_service.exe")) {
            throw "dist/agent_service.exe not found"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-service-windows
          path: dist/agent_service.exe